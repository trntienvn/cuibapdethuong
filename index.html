<!DOCTYPE html>

<section class="filter">

    <input type="text" id="keyword" placeholder="Tìm theo từ khóa...">

    <select id="city">
        <option value="">Thành phố</option>
        <option value="Vũng Tàu">Vũng Tàu</option>
        <option value="Bà Rịa">Bà Rịa</option>
    </select>

    <select id="ward">
        <option value="">Phường</option>
        <option value="Phường 7">Phường 7</option>
        <option value="Phường 8">Phường 8</option>
    </select>

    <input type="number" id="priceMin" placeholder="Giá từ (tỷ)">
    <input type="number" id="priceMax" placeholder="Đến (tỷ)">

    <button onclick="filterData()">Tìm kiếm</button>
</section>

<section id="list" class="list"></section>

<section id="about">
    <h2>Giới thiệu</h2>
    <p>Chuyên mua bán nhà đất tại Vũng Tàu - Bà Rịa, uy tín, giá tốt.</p>
</section>
